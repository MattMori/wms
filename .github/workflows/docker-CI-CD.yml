name: Docker Build, Scan & Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # 1. Constrói a imagem
    - name: Build da imagem
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: mattmori/wms-mori-api:latest

    # 2. Filtro de Segurança
    - name: Scanner de Vulnerabilidades (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'mattmori/wms-mori-api:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # 3. publicar a imagem
    - name: Push da imagem validada
      run: docker push mattmori/wms-mori-api:latest

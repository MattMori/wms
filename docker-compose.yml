services:
  wms-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: wms-app
    ports:
      - "8080:8080"
    dns:
      - 8.8.8.8
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - TZ=America/Sao_Paulo
    restart: unless-stopped
<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard WMS</title>
    <style>
        /* Estilos Básicos */
        body { font-family: sans-serif; background-color: #f4f6f8; margin: 0; }
        header { background-color: #1e1e2d; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 20px; }
        
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* GRID DE CARDS */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #777; font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: bold; color: #2c3e50; }
        .card .unit { font-size: 14px; color: #999; }

        /* Cores para os números */
        .text-blue { color: #3498db !important; }
        .text-green { color: #2ecc71 !important; }
        .text-red { color: #e74c3c !important; }

        /* Tabelas de TOP 5 */
        .list-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .list-box { background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        th { color: #777; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>🏭 WMS Dashboard</h1>
        <button onclick="sair()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 15px; cursor:pointer;">Sair</button>
    </header>

    <div class="container">
        <div class="kpi-grid">
            <div class="card">
                <h3>Ocupação</h3>
                <div class="value text-blue" id="lblOcupacao">--%</div>
                <div class="unit">do Armazém</div>
            </div>
            <div class="card">
                <h3>Estoque Físico</h3>
                <div class="value" id="lblTotalCaixas">--</div>
                <div class="unit">Caixas Armazenadas</div>
            </div>
            <div class="card">
                <h3>Capacidade</h3>
                <div class="value" id="lblCapacidade">--</div>
                <div class="unit">Caixas Totais</div>
            </div>
        </div>

        <div class="list-container">
            <div class="list-box">
                <h3>🏆 Top 5 - Mais Estocados</h3>
                <table>
                    <thead><tr><th>Produto</th><th>Qtd (Caixas)</th></tr></thead>
                    <tbody id="tbMais"></tbody>
                </table>
            </div>
            <div class="list-box">
                <h3>⚠️ Top 5 - Baixo Estoque</h3>
                <table>
                    <thead><tr><th>Produto</th><th>Qtd (Caixas)</th></tr></thead>
                    <tbody id="tbMenos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. Verifica se está logado
        const token = localStorage.getItem('wms_token');
        if (!token) {
            window.location.href = 'index.html'; // Chuta para o login
        }

        // 2. Carrega os Dados
        async function carregarDashboard() {
            try {
                const response = await fetch('/api/relatorios/dashboard', {
                    headers: { 'Authorization': 'Bearer ' + token } // <--- O CRACHÁ!
                });

                if (response.status === 403) {
                    sair(); // Token expirou
                    return;
                }

                const data = await response.json();

                // Preenche os Cards
                document.getElementById('lblOcupacao').innerText = data.porcentagemOcupacao + '%';
                document.getElementById('lblTotalCaixas').innerText = data.totalCaixasEmEstoque;
                document.getElementById('lblCapacidade').innerText = data.capacidadeTotalDoArmazem;

                // Preenche as Tabelas
                preencherTabela('tbMais', data.top5MaisEstocados);
                preencherTabela('tbMenos', data.top5MenosEstocados);

            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        function preencherTabela(idElemento, lista) {
            const tbody = document.getElementById(idElemento);
            tbody.innerHTML = ''; // Limpa
            lista.forEach(item => {
                const tr = `<tr>
                    <td>${item.nomeProduto}</td>
                    <td><strong>${item.quantidadeTotal}</strong></td>
                </tr>`;
                tbody.innerHTML += tr;
            });
        }

        function sair() {
            localStorage.removeItem('wms_token');
            window.location.href = 'index.html';
        }

        // Inicia
        carregarDashboard();
    </script>
</body>
</html>

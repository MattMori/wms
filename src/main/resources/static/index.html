<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMS Mori - Login</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #1e1e2d;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-card {
        background-color: #2a2a3c;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        width: 300px;
        text-align: center;
      }
      .login-card h2 {
        margin-bottom: 20px;
        color: #4fd1c5;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
        background-color: #1e1e2d;
        color: white;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #4fd1c5;
        border: none;
        color: #1e1e2d;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        background-color: #38b2ac;
      }
      .error {
        color: #ff6b6b;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>WMS Mori 🏗️</h2>
      <input type="text" id="matricula" placeholder="Matrícula (Ex: admin)" />
      <input type="password" id="senha" placeholder="Senha" />
      <button onclick="fazerLogin()">ENTRAR</button>
      <div id="msgErro" class="error">Login ou senha inválidos!</div>
    </div>

    <script>
      async function fazerLogin() {
        const matricula = document.getElementById("matricula").value;
        const senha = document.getElementById("senha").value;
        const msgErro = document.getElementById("msgErro");

        // 1. Monta o JSON
        const dados = { matricula: matricula, senha: senha };

        try {
          // 2. Chama o Backend
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados),
          });

          if (response.ok) {
            // 3. Sucesso: Guarda o Token e redireciona
            const json = await response.json();
            localStorage.setItem("wms_token", json.token);
            localStorage.setItem("wms_usuario", matricula);

            window.location.href = "dashboard.html";
          } else {
            // Erro
            msgErro.style.display = "block";
          }
        } catch (error) {
          console.error("Erro de conexão:", error);
          alert("Erro ao conectar com o servidor.");
        }
      }
    </script>
  </body>
</html>
